        <div id="cluster-visualization">

        </div>

    <script>
        const vizEl = document.getElementById('cluster-visualization');
        const width = Math.max(vizEl.clientWidth || 1200, 960);
        const margin = 48;
        
        let svg = d3.select('#cluster-visualization').html('').append('svg');
        
        let clusterData = [];
        let selectedClusterId = null;
        let selectedGroupId = null;

        const CLUSTER_CACHE_KEY = 'caselinker_cluster_groups_v3';
        const CLUSTER_CACHE_MAX_AGE_MS = 10 * 60 * 1000; // 10 min

        function getCachedClusters() {
            try {
                const cached = sessionStorage.getItem(CLUSTER_CACHE_KEY);
                if (!cached) return null;
                const { case_groups, fetchedAt } = JSON.parse(cached);
                if (!case_groups || !Array.isArray(case_groups)) return null;
                if (Date.now() - fetchedAt > CLUSTER_CACHE_MAX_AGE_MS) return null;
                return case_groups;
            } catch (e) {
                return null;
            }
        }

        function setCachedClusters(caseGroups) {
            try {
                sessionStorage.setItem(CLUSTER_CACHE_KEY, JSON.stringify({
                    case_groups: caseGroups,
                    fetchedAt: Date.now()
                }));
            } catch (e) {}
        }

        // --- Layout (5k+ cases / 500+ satellite bubbles) ---------------------------------
        const CLUSTER_GAP = 10;
        const INTRA_MOON_GAP = 15;
        const HUB_SATELLITE_GAP = 12;
        const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));
        /** Extra viewBox space so top satellites are not clipped (fixed viewBox mode). */
        const LAYOUT_TOP_INSET = 160;
        const LAYOUT_BOTTOM_PAD = 8;
        const LAYOUT_SIDE_PAD = 20;

        /** Hub scale: large planets; possession & general hubs trimmed a hair. */
        function hubRadius(cluster) {
            const s = Math.sqrt(cluster.size || 0);
            let r = cluster.group_id === 'online_only_cluster'
                ? s * 2.78 + 31
                : s * 2.01 + 31;
            if (cluster.group_id === 'possession_cluster' || cluster.group_id === 'general_cluster') {
                r *= 0.95;
            }
            return r;
        }

        /** Satellite scale; 300–1000+ cases use a softer curve so moons stay smaller than the hub. */
        function groupRadius(size, clusterId) {
            const n = Math.max(size || 1, 1);
            const small = (Math.sqrt(n) * 2.12 + 10.5) * 1.08;
            if (n < 300) return small;
            const at300 = (Math.sqrt(300) * 2.12 + 10.5) * 1.08;
            const t = Math.min(1, Math.log10(n / 300) / Math.log10(1000 / 300));
            const at1000 = at300 + 13;
            let r = Math.min(at300 + t * (at1000 - at300), at1000 + 4);
            if (n >= 300 && n <= 600) {
                const tMid = (n - 300) / 300;
                r *= 0.97 - tMid * 0.03;
            } else if (n > 600 && n < 1000) {
                r *= 0.94;
            } else if (n >= 1000) {
                r *= 0.93;
            }
            return r;
        }

        function collidesCircle(x, y, r, others, gap) {
            for (const o of others) {
                const dx = x - o.x;
                const dy = y - o.y;
                const minD = r + o.r + gap;
                if (dx * dx + dy * dy < minD * minD) return true;
            }
            return false;
        }

        function collidesHub(x, y, r, hubR, gap) {
            const minD = hubR + r + gap;
            return x * x + y * y < minD * minD;
        }

        function relaxSatellites(placed, hubR, iterations, moonGap) {
            const gap = moonGap != null ? moonGap : CLUSTER_GAP;
            for (let iter = 0; iter < iterations; iter++) {
                for (let i = 0; i < placed.length; i++) {
                    const a = placed[i];
                    const distHub = Math.hypot(a.x, a.y) || 0.001;
                    const minHub = hubR + a.r + HUB_SATELLITE_GAP + 2;
                    if (distHub < minHub) {
                        a.x = (a.x / distHub) * minHub;
                        a.y = (a.y / distHub) * minHub;
                    }
                    for (let j = i + 1; j < placed.length; j++) {
                        const b = placed[j];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.hypot(dx, dy) || 0.001;
                        const minD = a.r + b.r + gap;
                        if (dist < minD) {
                            const push = ((minD - dist) / dist) * 0.55;
                            a.x -= dx * push;
                            a.y -= dy * push;
                            b.x += dx * push;
                            b.y += dy * push;
                        }
                    }
                }
            }
        }

        function packSatellitesLocal(hubR, groups, clusterId) {
            const items = (groups || []).map((group, idx) => ({
                group,
                idx,
                r: groupRadius(group.size, clusterId)
            }));
            if (!items.length) return [];

            items.sort((a, b) => b.r - a.r);
            const placed = [];
            const gap = HUB_SATELLITE_GAP;
            let relaxIters = items.length > 100 ? 110 : items.length > 50 ? 85 : 65;
            const packGap = clusterId === 'possession_cluster' ? INTRA_MOON_GAP : CLUSTER_GAP;
            if (clusterId === 'possession_cluster') {
                relaxIters = Math.round(relaxIters * 1.3);
            }

            items.forEach((item, i) => {
                let x = 0;
                let y = 0;
                if (i === 0) {
                    x = hubR + item.r + gap;
                    y = 0;
                } else {
                    let found = false;
                    const maxAttempts = Math.min(3200, 900 + items.length * 14);
                    for (let attempt = 0; attempt < maxAttempts; attempt++) {
                        const angle = i * GOLDEN_ANGLE + attempt * 0.28;
                        const ringStep = Math.max(item.r * 1.45, 10);
                        const dist = hubR + item.r + gap + Math.sqrt(attempt + 1) * ringStep * 0.52;
                        const tx = Math.cos(angle) * dist;
                        const ty = Math.sin(angle) * dist;
                        if (!collidesHub(tx, ty, item.r, hubR, gap) &&
                            !collidesCircle(tx, ty, item.r, placed, packGap)) {
                            x = tx;
                            y = ty;
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        const angle = i * GOLDEN_ANGLE;
                        const dist = hubR + item.r + gap + i * 3.2;
                        x = Math.cos(angle) * dist;
                        y = Math.sin(angle) * dist;
                    }
                }
                placed.push({ ...item, x, y });
            });

            relaxSatellites(placed, hubR, relaxIters, packGap);
            return placed;
        }

        function fieldRadiusFromPack(hubR, packed) {
            let maxD = hubR;
            packed.forEach((p) => {
                const d = Math.hypot(p.x, p.y) + p.r + CLUSTER_GAP;
                if (d > maxD) maxD = d;
            });
            return maxD + 20;
        }

        /** When true, viewBox is 0..width × 0..layoutHeight so anchor y moves on screen (required for manual tuning). */
        const USE_FIXED_LAYOUT_VIEWBOX = true;

        /**
         * MANUAL CLUSTER POSITIONS — edit x/y here (hub center in layout pixels).
         * Hard-refresh /clusters after each change.
         * With USE_FIXED_LAYOUT_VIEWBOX: smaller y = higher on screen (try 80–220 for top row).
         * y is the big hub center; satellites extend above/below it by ~100–200px.
         */
        function getClusterAnchors(layoutWidth, layoutHeight) {
            return {
                possession_cluster: { x: layoutWidth * 0.19, y: 230 },
                general_cluster: { x: layoutWidth * 0.75, y: 300 },
                online_only_cluster: { x: layoutWidth * 0.44, y: layoutHeight * 0.42 },
                severe_cluster: { x: layoutWidth * 0.13, y: layoutHeight * 0.49 },
                investigation_cluster: { x: layoutWidth * 0.78, y: layoutHeight * 0.60 }
            };
        }

        function layoutHubPositions(hubSpecs, layoutWidth, layoutHeight) {
            const anchors = getClusterAnchors(layoutWidth, layoutHeight);
            hubSpecs.forEach((spec) => {
                const a = anchors[spec.cluster.group_id];
                if (a) {
                    spec.x = a.x;
                    spec.y = a.y;
                }
            });
        }

        function computeLayoutBounds(nodes, pad) {
            let minX = Infinity;
            let minY = Infinity;
            let maxX = -Infinity;
            let maxY = -Infinity;
            nodes.forEach((n) => {
                minX = Math.min(minX, n.x - n.r);
                maxX = Math.max(maxX, n.x + n.r);
                minY = Math.min(minY, n.y - n.r);
                maxY = Math.max(maxY, n.y + n.r);
            });
            return {
                minX: minX - pad,
                minY: minY - pad,
                maxX: maxX + pad,
                maxY: maxY + pad,
                width: maxX - minX + pad * 2,
                height: maxY - minY + pad * 2
            };
        }

        function buildClusterNodes(clusterData, layoutWidth, layoutHeight, colors) {
            const nodes = [];
            const hubSpecs = clusterData.map((cluster, i) => {
                const r = hubRadius(cluster);
                const packed = packSatellitesLocal(r, cluster.internal_groups || [], cluster.group_id);
                return {
                    cluster,
                    index: i,
                    r,
                    packed,
                    fieldR: fieldRadiusFromPack(r, packed),
                    color: colors[i % colors.length]
                };
            });

            layoutHubPositions(hubSpecs, layoutWidth, layoutHeight);

            hubSpecs.forEach((spec) => {
                const clusterX = spec.x;
                const clusterY = spec.y;

                nodes.push({
                    id: spec.cluster.group_id,
                    type: 'cluster',
                    cluster: spec.cluster,
                    r: spec.r,
                    x: clusterX,
                    y: clusterY,
                    color: spec.color,
                    fx: clusterX,
                    fy: clusterY
                });

                spec.packed.forEach((p) => {
                    nodes.push({
                        id: `${spec.cluster.group_id}_group_${p.idx}`,
                        type: 'group',
                        clusterId: spec.cluster.group_id,
                        group: p.group,
                        r: p.r,
                        x: clusterX + p.x,
                        y: clusterY + p.y,
                        color: spec.color,
                        opacity: 0.8,
                        clusterX,
                        clusterY,
                        clusterR: spec.r,
                        orbitR: Math.hypot(p.x, p.y)
                    });
                });
            });

            globalSeparateSatellites(nodes, 18);
            separateClusterMoons(nodes, 'possession_cluster');
            anchorSatellitesToOrbit(nodes);
            return nodes;
        }

        /** Enforce zero overlap among moons orbiting the same hub; hub position stays fixed. */
        function separateClusterMoons(nodes, clusterId) {
            const hub = nodes.find((n) => n.type === 'cluster' && n.id === clusterId);
            const groups = nodes.filter((n) => n.type === 'group' && n.clusterId === clusterId);
            if (!hub || groups.length < 2) return;

            const gap = INTRA_MOON_GAP;
            const iters = groups.length > 80 ? 140 : 100;
            const pushStrength = 0.58;

            for (let iter = 0; iter < iters; iter++) {
                for (let i = 0; i < groups.length; i++) {
                    const a = groups[i];
                    const dxh = a.x - hub.x;
                    const dyh = a.y - hub.y;
                    const distH = Math.hypot(dxh, dyh) || 0.001;
                    const minHub = hub.r + a.r + HUB_SATELLITE_GAP + 2;
                    if (distH < minHub) {
                        a.x = hub.x + (dxh / distH) * minHub;
                        a.y = hub.y + (dyh / distH) * minHub;
                    }
                    for (let j = i + 1; j < groups.length; j++) {
                        const b = groups[j];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.hypot(dx, dy) || 0.001;
                        const minD = a.r + b.r + gap;
                        if (dist < minD) {
                            const push = ((minD - dist) / dist) * pushStrength;
                            a.x -= dx * push;
                            a.y -= dy * push;
                            b.x += dx * push;
                            b.y += dy * push;
                        }
                    }
                }
            }
        }

        /** Keep moons outside hub only; allow orbit to expand outward (no max cap). */
        function anchorClusterMoons(nodes, clusterId) {
            const hub = nodes.find((n) => n.type === 'cluster' && n.id === clusterId);
            if (!hub) return;
            nodes
                .filter((n) => n.type === 'group' && n.clusterId === clusterId)
                .forEach((g) => {
                    const dx = g.x - hub.x;
                    const dy = g.y - hub.y;
                    const dist = Math.hypot(dx, dy) || 0.001;
                    const minOrbit = hub.r + g.r + HUB_SATELLITE_GAP + 2;
                    if (dist < minOrbit) {
                        g.x = hub.x + (dx / dist) * minOrbit;
                        g.y = hub.y + (dy / dist) * minOrbit;
                    }
                    g.clusterX = hub.x;
                    g.clusterY = hub.y;
                });
        }

        /** Push apart cross-cluster overlaps only; keep moons near their planet. */
        function globalSeparateSatellites(nodes, iterations) {
            const groups = nodes.filter((n) => n.type === 'group');
            const hubs = nodes.filter((n) => n.type === 'cluster');
            if (groups.length < 2) return;

            for (let iter = 0; iter < iterations; iter++) {
                for (let i = 0; i < groups.length; i++) {
                    const a = groups[i];
                    for (let j = i + 1; j < groups.length; j++) {
                        const b = groups[j];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.hypot(dx, dy) || 0.001;
                        const minD = a.r + b.r + CLUSTER_GAP;
                        if (dist < minD) {
                            const push = ((minD - dist) / dist) * 0.28;
                            a.x -= dx * push;
                            a.y -= dy * push;
                            b.x += dx * push;
                            b.y += dy * push;
                        }
                    }
                    hubs.forEach((h) => {
                        if (h.id === a.clusterId) return;
                        const dx = a.x - h.x;
                        const dy = a.y - h.y;
                        const dist = Math.hypot(dx, dy) || 0.001;
                        const minD = h.r + a.r + 14;
                        if (dist < minD) {
                            const push = ((minD - dist) / dist) * 0.35;
                            a.x += dx * push;
                            a.y += dy * push;
                        }
                    });
                }
            }
        }

        function anchorSatellitesToOrbit(nodes) {
            nodes.filter((n) => n.type === 'group').forEach((g) => {
                if (g.clusterId === 'possession_cluster') return;
                const dx = g.x - g.clusterX;
                const dy = g.y - g.clusterY;
                const dist = Math.hypot(dx, dy) || 0.001;
                const minOrbit = g.clusterR + g.r + HUB_SATELLITE_GAP;
                const maxOrbit = Math.max(g.orbitR * 1.35, minOrbit * 1.5);
                if (dist < minOrbit) {
                    g.x = g.clusterX + (dx / dist) * minOrbit;
                    g.y = g.clusterY + (dy / dist) * minOrbit;
                } else if (dist > maxOrbit) {
                    g.x = g.clusterX + (dx / dist) * maxOrbit;
                    g.y = g.clusterY + (dy / dist) * maxOrbit;
                }
            });
            anchorClusterMoons(nodes, 'possession_cluster');
        }

        // Load cluster data from cache or API
        async function loadClusters() {
            const cached = getCachedClusters();
            if (cached && cached.length > 0) {
                clusterData = cached;
                renderClusters();
                return;
            }
            try {
                const response = await fetch('/api/cluster-groups');
                const data = await response.json();
                if (data.success && data.case_groups) {
                    clusterData = data.case_groups;
                    setCachedClusters(clusterData);
                    renderClusters();
                } else {
                    showError('No cluster data available');
                }
            } catch (error) {
                console.error('Error loading clusters:', error);
                showError('Failed to load clusters. Make sure the API server is running.');
            }
        }

            d3.select('#cluster-visualization')
                .html(`<div class="error">${message}</div>`);

            let contentLeft = Infinity;
            let contentRight = -Infinity;
            let contentBottom = -Infinity;
            nodes.forEach((n) => {
                contentLeft = Math.min(contentLeft, n.x - n.r);
                contentRight = Math.max(contentRight, n.x + n.r);
                contentBottom = Math.max(contentBottom, n.y + n.r);
            });
            const viewBoxX = contentLeft - LAYOUT_SIDE_PAD;
            const viewBoxWidth = contentRight - contentLeft + LAYOUT_SIDE_PAD * 2;
            const viewBoxHeight = USE_FIXED_LAYOUT_VIEWBOX
                ? LAYOUT_TOP_INSET + contentBottom + LAYOUT_BOTTOM_PAD
                : layoutHeight + LAYOUT_TOP_INSET + LAYOUT_BOTTOM_PAD;
            const viewH = USE_FIXED_LAYOUT_VIEWBOX
                ? Math.ceil((viewBoxHeight / viewBoxWidth) * width)

            // Draw circles - clusters first (so they appear behind groups)

            nodes.forEach(node => {
                node.originalX = node.x;
                node.originalY = node.y;
            });

            const satCount = window.__clusterLayoutMeta?.totalSatellites || 0;
            if (satCount > 0) {
                startJiggleAnimation(satCount);
            }

        // Gentle jiggle animation for bubbles
        let jiggleAnimationId = null;
        function startJiggleAnimation(satelliteCount) {
            stopJiggleAnimation();

            const jiggleAmount = 1.5;
            const jiggleSpeed = 0.0018;
            let startTime = Date.now();
            
            function animate() {
                // Only select sub-cluster bubbles (group bubbles), NOT main clusters
                const groupBubbles = svg.selectAll('.group-bubble');
                const currentTime = Date.now();
                const elapsed = (currentTime - startTime) * jiggleSpeed;
                
                // Update each sub-cluster bubble's position
                groupBubbles.each(function(d) {
                    // Ensure we have original positions stored
                    if (d.originalX === undefined || d.originalY === undefined) {
                        d.originalX = d.x || 0;
                        d.originalY = d.y || 0;
                    }
                    
                    // Create smooth, organic jiggle using sine waves with different frequencies
                    // Each bubble has unique phase based on its ID for varied movement
                    const idStr = d.id ? String(d.id) : '0';
                    const phaseX = idStr.charCodeAt(0) * 0.1;
                    const phaseY = idStr.charCodeAt(0) * 0.15;
                    const freqX = 0.7 + (idStr.length > 1 ? (idStr.charCodeAt(1) % 5) * 0.05 : 0);
                    const freqY = 0.6 + (idStr.length > 2 ? (idStr.charCodeAt(2) % 5) * 0.05 : 0);
                    
                    const offsetX = Math.sin(elapsed + phaseX) * jiggleAmount * 
                                   (0.5 + Math.sin(elapsed * freqX + phaseX * 0.5) * 0.5);
                    const offsetY = Math.cos(elapsed * 0.8 + phaseY) * jiggleAmount * 
                                   (0.5 + Math.cos(elapsed * freqY + phaseY * 0.5) * 0.5);
                    
                    // Store jiggle offset (don't modify d.x and d.y - keep them at original)
                    d.jiggleX = offsetX;
                    d.jiggleY = offsetY;
                });
                
                // Keep the group transform at original position (so text stays static)
                groupBubbles.attr('transform', function(d) {
                    return `translate(${d.originalX},${d.originalY})`;
                });
                
                // Apply jiggle transform only to the circle element
                groupBubbles.selectAll('circle').attr('transform', function(d) {
                    const parentData = d3.select(this.parentNode).datum();
                    if (parentData && parentData.jiggleX !== undefined && parentData.jiggleY !== undefined) {
                        return `translate(${parentData.jiggleX},${parentData.jiggleY})`;
                    }
                    return 'translate(0,0)';
                });
                
                // Continue animation loop - ALWAYS continue forever
                jiggleAnimationId = requestAnimationFrame(animate);
            }
            
            // Start the animation loop
            jiggleAnimationId = requestAnimationFrame(animate);
        }
        
        function stopJiggleAnimation() {
            if (jiggleAnimationId) {
                cancelAnimationFrame(jiggleAnimationId);
                jiggleAnimationId = null;
            }
        }

        async function hydrateCaseTextForList(cases) {
            if (!Array.isArray(cases) || cases.length === 0) return;
            const missing = cases.filter(c => c && c.id && !(c.raw_data?.case_text || c.case_text));
            if (missing.length === 0) return;
            await Promise.all(missing.map(async (c) => {
                try {
                    const r = await caselinkerFetchCase(c.id);
                    if (!r.ok) return;
                    const full = await r.json();
                    const fullText = full?.raw_data?.case_text || full?.case_text || '';
                    if (fullText) c.case_text = fullText;
                    if (!c.date_range && full?.date_range) c.date_range = full.date_range;
                } catch (e) {
                    if (e && e.code === 'CASELINKER_DAILY_LIMIT') {
                        c._case_daily_limit = true;
                        c.case_text = CASELINKER_DAILY_CASE_LIMIT_UI_MESSAGE;
                    }
                }
            }));
        }

                listEl.innerHTML = '<div style="text-align: center; padding: 20px; color: #888;">No case IDs found</div>';
                return;
            }
            
            // Summaries via POST /api/cases-summaries-by-ids (batched); missing IDs via GET /api/cases/{id}
            const fullCases = [];
            try {
                console.log('Fetching cases for IDs:', caseIds);
                const byId = new Map();
                if (typeof caselinkerPostSummariesByIdsBatched === 'function') {
                    const summaries = await caselinkerPostSummariesByIdsBatched(caseIds, 500);

                    });

                for (const caseId of caseIds) {

                    }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        function getHighlightColor(category) {
            const colors = {
                'platform': 'highlight-platform',
                'severity': 'highlight-severity',
                'topic': 'highlight-topic',
                'agency': 'highlight-agency',
                'investigation': 'highlight-investigation',
                'relationship': 'highlight-relationship',
                'demographic': 'highlight-demographic',
                'evidence': 'highlight-evidence',
                'prosecution': 'highlight-prosecution',
                'severity-phrase': 'highlight-severity-phrase',
                'date': 'highlight-date'
            };
            return colors[category] || 'highlight-default';
        }
        
        function highlightCaseText(text, caseData) {
            if (!text) return '';
            
            // Escape HTML first
            let highlighted = escapeHtml(text);
            
            // Build list of terms to highlight with their categories
            const highlightTerms = [];
            
            // Platforms (highlight variations)
            let platforms = caseData.platforms_used || [];
            // Ensure platforms is an array
            if (!Array.isArray(platforms)) {
                if (typeof platforms === 'string') {
                    try {
                        platforms = JSON.parse(platforms);
                        if (!Array.isArray(platforms)) {
                            platforms = [];
                        }
                    } catch (e) {
                        platforms = [];
                    }
                } else {
                    platforms = [];
                }
            }
            platforms.forEach(platform => {
                highlightTerms.push({ term: platform, category: 'platform' });
                // Also highlight common variations
                const platformLower = platform.toLowerCase();
                if (platformLower.includes('facebook')) {
                    highlightTerms.push({ term: 'facebook', category: 'platform' });
                }
                if (platformLower.includes('instagram')) {
                    highlightTerms.push({ term: 'instagram', category: 'platform' });
                }
                if (platformLower.includes('snapchat')) {
                    highlightTerms.push({ term: 'snapchat', category: 'platform' });
                }
                if (platformLower.includes('discord')) {
                    highlightTerms.push({ term: 'discord', category: 'platform' });
                }
                if (platformLower.includes('whatsapp')) {
                    highlightTerms.push({ term: 'whatsapp', category: 'platform' });
                }
                if (platformLower === 'online' || platformLower.includes('online')) {
                    highlightTerms.push({ term: 'online', category: 'platform' });
                }
                if (platformLower === 'chat' || platformLower.includes('chat')) {
                    highlightTerms.push({ term: 'chat', category: 'platform' });
                }
            });
            
            // Severity indicators
            let severity = caseData.severity_indicators || [];
            // Ensure severity is an array
            if (!Array.isArray(severity)) {
                if (typeof severity === 'string') {
                    try {
                        severity = JSON.parse(severity);
                        if (!Array.isArray(severity)) {
                            severity = [];
                        }
                    } catch (e) {
                        severity = [];
                    }
                } else {
                    severity = [];
                }
            }
            severity.forEach(sev => {
                const sevStr = String(sev).toLowerCase();
                highlightTerms.push({ term: sevStr.replace(/_/g, ' '), category: 'severity' });
                highlightTerms.push({ term: sevStr.replace(/_/g, '-'), category: 'severity' });
                // Special handling for common severity terms
                if (sevStr.includes('infant')) {
                    highlightTerms.push({ term: 'infant', category: 'severity' });
                    highlightTerms.push({ term: 'infants', category: 'severity' });
                }
                if (sevStr.includes('sexual_abuse') || sevStr.includes('rape')) {
                    highlightTerms.push({ term: 'rape', category: 'severity' });
                    highlightTerms.push({ term: 'raped', category: 'severity' });
                    highlightTerms.push({ term: 'raping', category: 'severity' });
                    highlightTerms.push({ term: 'sexual assault', category: 'severity' });
                    highlightTerms.push({ term: 'sexually assaulted', category: 'severity' });
                    highlightTerms.push({ term: 'sexual abuse', category: 'severity' });
                    highlightTerms.push({ term: 'sexually abused', category: 'severity' });
                    highlightTerms.push({ term: 'molest', category: 'severity' });
                    highlightTerms.push({ term: 'molested', category: 'severity' });
                    highlightTerms.push({ term: 'molesting', category: 'severity' });
                }
                if (sevStr.includes('very_young') || sevStr.includes('very young')) {
                    highlightTerms.push({ term: 'very young', category: 'severity' });
                }
                if (sevStr.startsWith('under_')) {
                    const age = sevStr.replace('under_', '');
                    highlightTerms.push({ term: `under ${age}`, category: 'severity' });
                    highlightTerms.push({ term: `under-${age}`, category: 'severity' });
                }
            });
            
            // Case topics
            let topics = caseData.case_topics || [];
            // Ensure topics is an array
            if (!Array.isArray(topics)) {
                if (typeof topics === 'string') {
                    try {
                        topics = JSON.parse(topics);
                        if (!Array.isArray(topics)) {
                            topics = [];
                        }
                    } catch (e) {
                        topics = [];
                    }
                } else {
                    topics = [];
                }
            }
            topics.forEach(topic => {
                const topicStr = String(topic).toLowerCase();
                highlightTerms.push({ term: topicStr.replace(/_/g, ' '), category: 'topic' });
                // Common variations
                if (topicStr === 'production') {
                    highlightTerms.push({ term: 'produced', category: 'topic' });
                    highlightTerms.push({ term: 'producing', category: 'topic' });
                }
                if (topicStr === 'possession') {
                    highlightTerms.push({ term: 'possessed', category: 'topic' });
                    highlightTerms.push({ term: 'possessing', category: 'topic' });
                }
                if (topicStr.includes('hands_on') || topicStr.includes('hands-on')) {
                    highlightTerms.push({ term: 'hands-on', category: 'topic' });
                    highlightTerms.push({ term: 'hands on', category: 'topic' });
                }
                if (topicStr === 'online_only' || topicStr.includes('online-only')) {
                    highlightTerms.push({ term: 'online-only', category: 'topic' });
                }
            });
            
            // Agencies involved
            let agencies = caseData.agencies_involved || [];
            // Ensure agencies is an array
            if (!Array.isArray(agencies)) {
                if (typeof agencies === 'string') {
                    try {
                        agencies = JSON.parse(agencies);
                        if (!Array.isArray(agencies)) {
                            agencies = [];
                        }
                    } catch (e) {
                        agencies = [];
                    }
                } else {
                    agencies = [];
                }
            }
            agencies.forEach(agency => {
                highlightTerms.push({ term: agency, category: 'agency' });
                // Common abbreviations
                if (agency === 'FBI') {
                    highlightTerms.push({ term: 'Federal Bureau of Investigation', category: 'agency' });
                }
                if (agency.includes('AZICAC') || agency.includes('Arizona Internet Crimes')) {
                    highlightTerms.push({ term: 'AZICAC', category: 'agency' });
                    highlightTerms.push({ term: 'Arizona Internet Crimes Against Children', category: 'agency' });
                }
                if (agency.includes('ICAC')) {
                    highlightTerms.push({ term: 'ICAC', category: 'agency' });
                    highlightTerms.push({ term: 'Internet Crimes Against Children', category: 'agency' });
                }
            });
            
            // Investigation type
            const investigationType = caseData.investigation_type || caseData.investigation_methods_and_teams?.type;
            if (investigationType) {
                const invType = String(investigationType).toLowerCase();
                highlightTerms.push({ term: invType.replace(/_/g, ' '), category: 'investigation' });
                if (invType === 'proactive') {
                    highlightTerms.push({ term: 'proactive', category: 'investigation' });
                }
                if (invType === 'reactive') {
                    highlightTerms.push({ term: 'reactive', category: 'investigation' });
                }
                if (invType === 'undercover') {
                    highlightTerms.push({ term: 'undercover', category: 'investigation' });
                }
            }
            
            // Relationship to victim
            const relationship = caseData.relationship_to_victim;
            if (relationship) {
                const relStr = String(relationship).toLowerCase();
                highlightTerms.push({ term: relStr.replace(/_/g, ' '), category: 'relationship' });
                // Common variations
                if (relStr === 'father') {
                    highlightTerms.push({ term: 'father', category: 'relationship' });
                    highlightTerms.push({ term: 'dad', category: 'relationship' });
                }
                if (relStr === 'mother') {
                    highlightTerms.push({ term: 'mother', category: 'relationship' });
                    highlightTerms.push({ term: 'mom', category: 'relationship' });
                }
            }
            
            // Perpetrator age
            const perpAge = caseData.perpetrator_age;
            if (perpAge !== undefined && perpAge !== null) {
                highlightTerms.push({ term: `${perpAge} year old`, category: 'demographic' });
                highlightTerms.push({ term: `${perpAge}-year-old`, category: 'demographic' });
                highlightTerms.push({ term: `${perpAge} years old`, category: 'demographic' });
            }
            
            // Registered sex offender
            const perpRegistered = caseData.perpetrator_registered_sex_offender;
            if (perpRegistered === true) {
                highlightTerms.push({ term: 'registered sex offender', category: 'demographic' });
                highlightTerms.push({ term: 'RSO', category: 'demographic' });
            }
            
            // Evidence volume
            const evidence = caseData.evidence_volume;
            if (evidence) {
                if (evidence.images) {
                    highlightTerms.push({ term: `${evidence.images} image`, category: 'evidence' });
                    highlightTerms.push({ term: `${evidence.images} images`, category: 'evidence' });
                }
                if (evidence.videos) {
                    highlightTerms.push({ term: `${evidence.videos} video`, category: 'evidence' });
                    highlightTerms.push({ term: `${evidence.videos} videos`, category: 'evidence' });
                }
                if (evidence.messages) {
                    highlightTerms.push({ term: `${evidence.messages} message`, category: 'evidence' });
                    highlightTerms.push({ term: `${evidence.messages} messages`, category: 'evidence' });
                }
            }
            
            // Prosecution outcome
            const prosecution = caseData.prosecution_outcome;
            if (prosecution) {
                // Ensure charges is an array
                let charges = prosecution.charges;
                if (!charges) {
                    charges = [];
                } else if (!Array.isArray(charges)) {
                    // If it's a string, try to parse it
                    if (typeof charges === 'string') {
                        try {
                            charges = JSON.parse(charges);
                            if (!Array.isArray(charges)) {
                                charges = [];
                            }
                        } catch (e) {
                            charges = [];
                        }
                    } else {
                        charges = [];
                    }
                }
                charges.forEach(ch => {
                    const chargeName = (typeof ch === 'string') ? ch : (ch && ch.charge ? ch.charge : '');
                    if (chargeName) {
                        highlightTerms.push({ term: chargeName, category: 'prosecution' });
                    }
                });
                if (prosecution.booking_status) {
                    highlightTerms.push({ term: prosecution.booking_status.toLowerCase(), category: 'prosecution' });
                    if (prosecution.booking_status.toLowerCase() === 'booked') {
                        highlightTerms.push({ term: 'booked', category: 'prosecution' });
                    }
                }
                // Common prosecution terms
                highlightTerms.push({ term: 'arrested', category: 'prosecution' });
                highlightTerms.push({ term: 'arrest', category: 'prosecution' });
                highlightTerms.push({ term: 'charged', category: 'prosecution' });
                highlightTerms.push({ term: 'charges', category: 'prosecution' });
            }
            
            // Severity phrases
            let severityPhrases = caseData.severity_phrases || [];
            // Ensure severityPhrases is an array
            if (!Array.isArray(severityPhrases)) {
                if (typeof severityPhrases === 'string') {
                    try {
                        severityPhrases = JSON.parse(severityPhrases);
                        if (!Array.isArray(severityPhrases)) {
                            severityPhrases = [];
                        }
                    } catch (e) {
                        severityPhrases = [];
                    }
                } else {
                    severityPhrases = [];
                }
            }
            severityPhrases.forEach(phrase => {
                highlightTerms.push({ term: String(phrase).toLowerCase(), category: 'severity-phrase' });
            });
            
            // Date mentions
            const dateStr = caseData.date_range?.start || caseData.raw_data?.month_year || caseData.date_start;
            if (dateStr) {
                // Try to extract month/year for highlighting
                const monthYear = caseData.raw_data?.month_year;
                if (monthYear) {
                    highlightTerms.push({ term: monthYear, category: 'date' });
                }
            }
            
            // Sort by length (longest first) to avoid partial matches
            highlightTerms.sort((a, b) => b.term.length - a.term.length);
            
            // Remove duplicates
            const seen = new Set();
            const uniqueTerms = highlightTerms.filter(item => {
                const key = `${item.term.toLowerCase()}_${item.category}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
            
            // Apply highlights - simple approach: replace text, avoiding already highlighted sections
            uniqueTerms.forEach(({ term, category }) => {
                const escapedTerm = escapeRegex(term);
                const colorClass = getHighlightColor(category);
                
                // Split by existing highlight spans
                const parts = highlighted.split(/(<span class="case-text-highlight[^"]*">.*?<\/span>)/gi);
                highlighted = parts.map(part => {
                    // Skip parts that are already highlighted
                    if (part.trim().startsWith('<span class="case-text-highlight')) {
                        return part;
                    }
                    // Apply new highlights to unhighlighted text
                    const regex = new RegExp(`\\b${escapedTerm}\\b`, 'gi');
                    return part.replace(regex, (match) => {
                        return `<span class="case-text-highlight ${colorClass}">${match}</span>`;
                    });
                }).join('');
            });
            
            return highlighted;
        }
        
        // Load clusters on page load
        loadClusters();
    </script>
